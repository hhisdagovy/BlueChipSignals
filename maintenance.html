<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | BlueChip Signals</title>
    <link rel="icon" type="image/png" href="assets/images/Crest logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        :root {
            /* RGB channels for use inside rgba() — values derived from global.css tokens */
            --gold-rgb:       179, 161, 125;   /* matches --primary-gold: #b3a17d  */
            --gold-light-rgb: 226, 207, 181;   /* matches --secondary-gold: #E2CFB5 */
            --white-rgb:      255, 255, 255;

            --card-bg: #0d1120;
        }

        html, body { height: 100%; }

        body {
            background: var(--dark-bg);
            color: var(--light-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
            position: relative;
            overflow: hidden;
        }

        /* ── Background layers ── */
        .bg-glow-top {
            position: fixed;
            top: -180px; left: 50%;
            transform: translateX(-50%);
            width: 900px; height: 600px;
            background: radial-gradient(ellipse at center top, rgba(var(--gold-rgb), 0.13) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        .bg-glow-bottom {
            position: fixed;
            bottom: -200px; left: 50%;
            transform: translateX(-50%);
            width: 700px; height: 500px;
            background: radial-gradient(ellipse at center, rgba(var(--gold-rgb), 0.06) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        /* Subtle dot grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(var(--white-rgb), 0.045) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none; z-index: 0;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid rgba(var(--gold-rgb), 0.25);
            border-radius: 28px;
            padding: 3rem 2.75rem 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(var(--gold-rgb), 0.06) inset,
                0 8px 32px rgba(0,0,0,0.55),
                0 0 80px rgba(var(--gold-rgb), 0.07);
            animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Animated gold top-border glow */
        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(var(--gold-rgb), 0.8), rgba(var(--gold-light-rgb), 0.9), rgba(var(--gold-rgb), 0.8), transparent);
            border-radius: 1px;
            animation: shimmerBorder 3s ease-in-out infinite;
        }

        @keyframes shimmerBorder {
            0%, 100% { opacity: 0.6; }
            50%       { opacity: 1; }
        }

        /* ── Logo ── */
        .logo-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 88px; height: 88px;
            margin-bottom: 1.75rem;
        }

        .logo-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1.5px solid rgba(var(--gold-rgb), 0.35);
            background: radial-gradient(circle at center, rgba(var(--gold-rgb), 0.1) 0%, transparent 70%);
            animation: ringPulse 3s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(var(--gold-rgb), 0); }
            50%       { box-shadow: 0 0 20px 4px rgba(var(--gold-rgb), 0.15); }
        }

        .logo-wrap img {
            position: relative;
            width: 62px; height: 62px;
            object-fit: contain;
            filter: drop-shadow(0 2px 10px rgba(var(--gold-rgb), 0.5)) brightness(1.1);
        }

        /* ── Status pill ── */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--primary-gold);
            background: rgba(var(--gold-rgb), 0.1);
            border: 1px solid rgba(var(--gold-rgb), 0.28);
            padding: 0.28rem 0.9rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--primary-gold);
            animation: dotPulse 1.8s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.75); }
        }

        /* ── Icon container ── */
        .icon-wrap {
            width: 72px; height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(var(--gold-rgb), 0.15), rgba(var(--gold-rgb), 0.05));
            border: 1px solid rgba(var(--gold-rgb), 0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.85rem;
            color: var(--primary-gold);
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 20px rgba(var(--gold-rgb), 0.12);
            animation: iconFloat 4s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }

        /* ── Title ── */
        .eyebrow {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(var(--gold-rgb), 0.65);
            margin-bottom: 0.6rem;
        }

        .title {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.1rem;
            font-weight: 400;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--secondary-gold) 55%, var(--primary-gold) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            margin-bottom: 0.9rem;
            letter-spacing: -0.01em;
        }

        .divider {
            width: 56px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
            margin: 0 auto 1.4rem;
            border-radius: 2px;
        }

        /* ── Message ── */
        .message {
            font-size: 0.9rem;
            color: rgba(var(--white-rgb), 0.55);
            line-height: 1.75;
            margin-bottom: 1.5rem;
            min-height: 2.5rem;
        }

        /* ── Go to Dashboard (per-page maintenance only) ── */
        .maint-dashboard-btn {
            display: none;
            margin-bottom: 2rem;
        }
        .maint-dashboard-btn.visible {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.5rem;
            background: rgba(var(--gold-rgb), 0.12);
            border: 1px solid rgba(var(--gold-rgb), 0.35);
            border-radius: 10px;
            color: var(--primary-gold);
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .maint-dashboard-btn.visible:hover {
            background: rgba(var(--gold-rgb), 0.18);
            border-color: rgba(var(--gold-rgb), 0.5);
        }

        /* ── Footer ── */
        .footer {
            font-size: 0.7rem;
            color: rgba(var(--white-rgb), 0.2);
            letter-spacing: 0.04em;
            border-top: 1px solid rgba(var(--white-rgb), 0.07);
            padding-top: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .footer-brand {
            color: rgba(var(--gold-rgb), 0.55);
            font-weight: 600;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 2.25rem 1.75rem 2rem; }
            .title { font-size: 1.7rem; }
            .logo-wrap { width: 72px; height: 72px; }
            .logo-wrap img { width: 52px; height: 52px; }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="bg-grid"></div>
    <div class="bg-glow-top"></div>
    <div class="bg-glow-bottom"></div>

    <!-- Card -->
    <div class="card">

        <!-- Logo with ring -->
        <div class="logo-wrap">
            <div class="logo-ring"></div>
            <img src="assets/images/Crest logo.png" alt="BlueChip Signals">
        </div>

        <!-- Status pill -->
        <div class="status-pill">
            <span class="status-dot"></span>
            Temporarily Offline
        </div>

        <!-- Icon -->
        <div class="icon-wrap">
            <i class="fas fa-wrench"></i>
        </div>

        <!-- Headline -->
        <div class="eyebrow">BlueChip Signals</div>
        <h1 class="title">Scheduled Maintenance</h1>
        <div class="divider"></div>

        <!-- Message (overwritten by Firestore if custom message is set) -->
        <p class="message" id="maintenanceMsg">
            We're currently performing scheduled maintenance.<br>
            We'll be back shortly — thank you for your patience.
        </p>

        <a href="dashboard.html" class="maint-dashboard-btn" id="goToDashboardBtn">
            <i class="fas fa-home"></i> Go to Dashboard
        </a>

        <!-- Footer -->
        <div class="footer">
            <span>&copy; <span id="maintenanceYear">2026</span></span>
            <span class="footer-brand">BlueChip Signals</span>
            <span>&mdash; All rights reserved</span>
        </div>

    </div>

    <script type="module">
        import { db, doc, getDoc } from './assets/js/firebase-config.js';

        document.getElementById('maintenanceYear').textContent = new Date().getFullYear();

        const pageParam = new URLSearchParams(window.location.search).get('page');
        let messageSet = false;

        async function checkAndRedirect() {
            try {
                const snap = await getDoc(doc(db, 'settings', 'site'));
                if (!snap.exists()) return;
                const data = snap.data();
                const pages = data.maintenancePages || {};

                if (!messageSet) {
                    if (pageParam && pages[pageParam] && pages[pageParam].message && pages[pageParam].message.trim()) {
                        document.getElementById('maintenanceMsg').innerHTML = pages[pageParam].message;
                    } else if (data.maintenanceMessage && data.maintenanceMessage.trim()) {
                        document.getElementById('maintenanceMsg').innerHTML = data.maintenanceMessage;
                    }
                    messageSet = true;
                }

                /* Per-page only: show "Go to Dashboard" if dashboard is not in maintenance */
                const btn = document.getElementById('goToDashboardBtn');
                if (btn && pageParam && !(pages['dashboard'] && pages['dashboard'].enabled)) {
                    btn.classList.add('visible');
                }

                /* Redirect when maintenance is lifted */
                const siteWideOff = !data.maintenanceMode;
                const pageMaintenanceOff = pageParam && (!pages[pageParam] || !pages[pageParam].enabled);
                if (pageParam) {
                    /* Per-page maintenance: only redirect when THIS page's maintenance is lifted */
                    if (pageMaintenanceOff) window.location.href = pageParam + '.html';
                } else {
                    /* Site-wide maintenance: redirect to dashboard when lifted */
                    if (siteWideOff) window.location.href = 'dashboard.html';
                }
            } catch (_) { /* fail silently */ }
        }

        await checkAndRedirect();
        setInterval(checkAndRedirect, 12000);
    </script>
</body>
</html>
