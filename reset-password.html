<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Chip Signals - Set Password</title>
  <link rel="icon" type="image/png" href="assets/images/Crest logo.png">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 4rem;
      background: radial-gradient(circle at 50% 50%, rgba(201, 176, 55, 0.08), transparent 50%);
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    .login-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(201,176,55,0.09) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper::after {
      content: '';
      position: absolute;
      top: -100px; left: -15%; right: -15%; bottom: -80px;
      background:
        linear-gradient(to bottom,
          transparent 0%,
          transparent 35%,
          rgba(5, 8, 16, 0.4) 65%,
          rgba(5, 8, 16, 0.85) 88%,
          var(--darker-bg) 100%
        ),
        radial-gradient(circle at 35% 55%, rgba(201,176,55,0.10), transparent 50%),
        radial-gradient(circle at 72% 30%, rgba(201,176,55,0.05), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      background: linear-gradient(150deg, rgba(201,176,55,0.1) 0%, rgba(10,14,22,0.85) 55%);
      border: 1px solid rgba(201,176,55,0.28);
      border-top: 3px solid var(--primary-gold);
      border-radius: 20px;
      padding: 3rem;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 10px 28px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .login-inner { position: relative; z-index: 2; }
    .login-header { text-align: center; margin-bottom: 2rem; }

    .login-header-logo {
      width: min(180px, 56%);
      height: auto;
      display: block;
      margin: 0 auto 0.75rem;
      filter: drop-shadow(0 10px 18px rgba(201, 176, 55, 0.18));
    }

    .login-header p { color: var(--gray-text); font-size: 0.95rem; }

    .form-group { margin-bottom: 1.2rem; }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--light-text);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: var(--field-bg);
      border: 1px solid rgba(201, 176, 55, 0.2);
      border-radius: 10px;
      color: var(--light-text);
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-gold);
      box-shadow: 0 0 0 3px rgba(201, 176, 55, 0.15), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .login-button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
      color: var(--darker-bg);
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      margin-top: 0.6rem;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201, 176, 55, 0.3);
    }

    .login-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-message,
    .success-message {
      display: none;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .error-message {
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #ffb3bd;
    }

    .success-message {
      background: rgba(61, 220, 151, 0.15);
      border: 1px solid rgba(61, 220, 151, 0.3);
      color: #b5f5d7;
    }

    .back-link {
      margin-top: 1rem;
      display: inline-block;
      color: var(--primary-gold);
      text-decoration: none;
    }

    .back-link:hover { color: var(--secondary-gold); }
  </style>
</head>
<body>
  <main class="login-wrapper">
    <div class="login-container">
      <div class="login-inner">
        <div class="login-header">
          <img src="assets/images/Crest logo.png" alt="Blue Chip Signals" class="login-header-logo">
          <h1>Set your password</h1>
          <p>Create your password to access the member dashboard.</p>
        </div>

        <form id="resetForm">
          <div class="form-group">
            <label for="password">New password</label>
            <input id="password" type="password" autocomplete="new-password" minlength="8" required />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
          </div>

          <button id="submitBtn" type="submit" class="login-button">Save password</button>
          <div id="errorMessage" class="error-message"></div>
          <div id="successMessage" class="success-message"></div>
        </form>

        <a class="back-link" href="/login.html"><i class="fas fa-arrow-left"></i> Back to login</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { getSupabase } from './src/lib/supabase-browser.js'

    const form = document.getElementById('resetForm')
    const passwordInput = document.getElementById('password')
    const confirmInput = document.getElementById('confirmPassword')
    const submitBtn = document.getElementById('submitBtn')
    const errorMessage = document.getElementById('errorMessage')
    const successMessage = document.getElementById('successMessage')

    function showError(text) {
      errorMessage.textContent = text
      errorMessage.style.display = 'block'
      successMessage.style.display = 'none'
    }

    function showSuccess(text) {
      successMessage.textContent = text
      successMessage.style.display = 'block'
      errorMessage.style.display = 'none'
    }

    function decodeParam(value) {
      if (!value) return ''
      try {
        return decodeURIComponent(value.replace(/\+/g, ' '))
      } catch (_e) {
        return value
      }
    }

    async function waitForSession(supabase, attempts = 25, delayMs = 80) {
      for (let i = 0; i < attempts; i++) {
        const { data, error } = await supabase.auth.getSession()
        if (error) throw error
        if (data?.session) return data.session
        await new Promise((r) => setTimeout(r, delayMs))
      }
      return null
    }

    async function ensureRecoverySession() {
      const supabase = await getSupabase()
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''))
      const search = new URLSearchParams(window.location.search)
      const type = hash.get('type') || search.get('type') || ''
      const code = search.get('code') || ''
      const accessToken = hash.get('access_token') || search.get('access_token') || ''
      const refreshToken = hash.get('refresh_token') || search.get('refresh_token') || ''

      const hashError = hash.get('error') || search.get('error') || ''
      if (hashError) {
        const desc = decodeParam(hash.get('error_description') || search.get('error_description') || '')
        throw new Error(desc || 'This link is invalid or has expired.')
      }

      if (type && type !== 'recovery') {
        throw new Error('Invalid link type.')
      }

      if (code) {
        const { error: exchangeError } = await supabase.auth.exchangeCodeForSession(code)
        if (exchangeError) {
          throw new Error(exchangeError.message || 'Password link is invalid or expired.')
        }
        try {
          const url = new URL(window.location.href)
          url.searchParams.delete('code')
          const qs = url.searchParams.toString()
          window.history.replaceState(null, '', `${url.pathname}${qs ? `?${qs}` : ''}`)
        } catch (_e) {
          /* ignore */
        }
      } else if (accessToken && refreshToken) {
        const { error: sessionError } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        })
        if (sessionError) {
          throw new Error(sessionError.message || 'Password link is invalid or expired.')
        }
        try {
          const path = `${window.location.pathname}${window.location.search}`
          window.history.replaceState(null, '', path)
        } catch (_e) {
          /* ignore */
        }
      }

      const { data, error } = await supabase.auth.getSession()
      if (error) throw error
      let session = data?.session || null
      if (!session) {
        session = await waitForSession(supabase)
      }
      if (!session) {
        throw new Error('Password link is invalid or expired. Request a new one from login.')
      }

      return supabase
    }

    let supabase
    try {
      supabase = await ensureRecoverySession()
    } catch (error) {
      showError(error.message || 'Unable to validate reset link.')
      submitBtn.disabled = true
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault()
      if (!supabase) return

      const password = passwordInput.value.trim()
      const confirm = confirmInput.value.trim()

      if (password.length < 8) {
        showError('Password must be at least 8 characters.')
        return
      }

      if (password !== confirm) {
        showError('Passwords do not match.')
        return
      }

      submitBtn.disabled = true
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...'

      const { error } = await supabase.auth.updateUser({ password })

      if (error) {
        showError(error.message || 'Failed to update password.')
        submitBtn.disabled = false
        submitBtn.textContent = 'Save password'
        return
      }

      showSuccess('Password set. Redirecting to login...')
      setTimeout(() => {
        window.location.href = '/login.html'
      }, 1200)
    })
  </script>
</body>
</html>
