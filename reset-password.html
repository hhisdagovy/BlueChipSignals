<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password | Blue Chip Signals</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card: #121a2b;
      --text: #f5f7ff;
      --muted: #9aa4bd;
      --gold: #d4af37;
      --danger: #ff6b6b;
      --ok: #3ddc97;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid rgba(212, 175, 55, 0.24);
      border-radius: 14px;
      padding: 28px;
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    p { margin: 0 0 20px; color: var(--muted); }
    label { display: block; font-size: 0.9rem; margin-bottom: 8px; }
    input {
      width: 100%;
      background: #0f1626;
      color: var(--text);
      border: 1px solid #2a3652;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      background: var(--gold);
      color: #111;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 12px; font-size: 0.9rem; display: none; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--ok); }
    .link { margin-top: 16px; display: inline-block; color: var(--gold); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set your password</h1>
    <p>Create a password for your Blue Chip Signals account.</p>

    <form id="resetForm">
      <label for="password">New password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required />

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />

      <button id="submitBtn" type="submit">Save password</button>
      <div id="message" class="msg"></div>
    </form>

    <a class="link" href="/login.html">Back to login</a>
  </div>

  <script type="module">
    import { getSupabase } from './src/lib/supabase-browser.js'

    const form = document.getElementById('resetForm')
    const passwordInput = document.getElementById('password')
    const confirmInput = document.getElementById('confirmPassword')
    const submitBtn = document.getElementById('submitBtn')
    const message = document.getElementById('message')

    function setMessage(text, type) {
      message.textContent = text
      message.className = `msg ${type}`
      message.style.display = 'block'
    }

    async function ensureRecoverySession() {
      const supabase = await getSupabase()
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''))
      const search = new URLSearchParams(window.location.search)
      const type = hash.get('type') || search.get('type') || ''

      if (type && type !== 'recovery') {
        throw new Error('Invalid link type.')
      }

      const { data, error } = await supabase.auth.getSession()
      if (error) throw error
      if (!data?.session) {
        throw new Error('Password link is invalid or expired. Request a new one from login.')
      }

      return supabase
    }

    let supabase
    try {
      supabase = await ensureRecoverySession()
    } catch (error) {
      setMessage(error.message || 'Unable to validate reset link.', 'error')
      submitBtn.disabled = true
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault()
      if (!supabase) return

      const password = passwordInput.value.trim()
      const confirm = confirmInput.value.trim()

      if (password.length < 8) {
        setMessage('Password must be at least 8 characters.', 'error')
        return
      }

      if (password !== confirm) {
        setMessage('Passwords do not match.', 'error')
        return
      }

      submitBtn.disabled = true
      submitBtn.textContent = 'Saving...'

      const { error } = await supabase.auth.updateUser({ password })

      if (error) {
        setMessage(error.message || 'Failed to update password.', 'error')
        submitBtn.disabled = false
        submitBtn.textContent = 'Save password'
        return
      }

      setMessage('Password set. Redirecting to login...', 'success')
      setTimeout(() => {
        window.location.href = '/login.html'
      }, 1200)
    })
  </script>
</body>
</html>
