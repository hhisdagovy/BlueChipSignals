<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal History - Blue Chip Signals</title>
    <link rel="icon" type="image/png" href="assets/images/Crest logo.png">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overflow-x: hidden; }

        .main-content {
            margin-top: 110px;
            padding: 0 2rem 3rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Page header ── */
        .hist-hero {
            background: rgba(10, 14, 22, 0.7);
            border: 1px solid rgba(201, 176, 55, 0.18);
            border-radius: 20px;
            padding: 1.75rem 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .hist-hero-left h1 {
            font-size: 1.45rem;
            font-weight: 800;
            color: var(--primary-gold);
            margin: 0 0 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .hist-hero-left p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin: 0;
        }

        .hist-plan-badge {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 0.3rem 0.75rem;
            border-radius: 50px;
            background: rgba(201,176,55,0.1);
            border: 1px solid rgba(201,176,55,0.3);
            color: var(--primary-gold);
            white-space: nowrap;
        }

        .hist-plan-badge.single {
            background: rgba(91,158,255,0.1);
            border-color: rgba(91,158,255,0.3);
            color: #5b9eff;
        }

        /* ── Filter bar ── */
        .hist-filters {
            background: rgba(10, 14, 22, 0.7);
            border: 1px solid rgba(201, 176, 55, 0.12);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
        }

        .hist-filter-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.3rem;
        }

        .hist-filter-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-right: 0.2rem;
            white-space: nowrap;
        }

        .hist-filter-divider {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.08);
            margin: 0 0.25rem;
        }

        .hist-pill {
            font-size: 0.67rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 0.25rem 0.65rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        .hist-pill:hover {
            border-color: rgba(201,176,55,0.4);
            color: rgba(255,255,255,0.8);
        }

        .hist-pill.active {
            background: rgba(201,176,55,0.14);
            border-color: rgba(201,176,55,0.5);
            color: var(--primary-gold);
        }

        .hist-pill.call.active {
            background: rgba(74,222,128,0.1);
            border-color: rgba(74,222,128,0.35);
            color: #4ade80;
        }

        .hist-pill.put.active {
            background: rgba(248,113,113,0.1);
            border-color: rgba(248,113,113,0.35);
            color: #f87171;
        }

        .hist-date-input {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.7);
            outline: none;
            transition: border-color 0.18s;
            max-width: 135px;
        }

        .hist-date-input:focus {
            border-color: rgba(201,176,55,0.45);
        }

        .hist-clear-btn {
            margin-left: auto;
            font-size: 0.67rem;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 0.25rem 0.65rem;
            cursor: pointer;
            transition: all 0.18s;
        }

        .hist-clear-btn:hover {
            color: rgba(255,255,255,0.65);
            border-color: rgba(255,255,255,0.2);
        }

        /* ── Table wrapper ── */
        .hist-table-card {
            background: rgba(10, 14, 22, 0.7);
            border: 1px solid rgba(201, 176, 55, 0.12);
            border-radius: 14px;
            overflow: hidden;
        }

        .hist-table-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1.25rem 0.7rem;
            border-bottom: 1px solid rgba(201,176,55,0.08);
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .hist-table-meta-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hist-table-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
        }

        .hist-count-badge {
            font-size: 0.63rem;
            font-weight: 700;
            padding: 0.1rem 0.45rem;
            border-radius: 20px;
            background: rgba(201,176,55,0.1);
            border: 1px solid rgba(201,176,55,0.2);
            color: var(--primary-gold);
        }

        .hist-table-scroll {
            overflow-x: auto;
        }

        table.hist-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }

        table.hist-table thead th {
            padding: 0.65rem 1rem;
            text-align: left;
            font-size: 0.63rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(201,176,55,0.08);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s;
        }

        table.hist-table thead th:hover {
            color: var(--primary-gold);
        }

        table.hist-table thead th .sort-icon {
            margin-left: 0.3rem;
            opacity: 0.4;
            font-size: 0.55rem;
        }

        table.hist-table thead th.sorted .sort-icon { opacity: 1; color: var(--primary-gold); }

        table.hist-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }

        table.hist-table tbody tr:last-child { border-bottom: none; }

        table.hist-table tbody tr:hover {
            background: rgba(201,176,55,0.04);
        }

        table.hist-table tbody td {
            padding: 0.7rem 1rem;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }

        .hist-ticker-badge {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            padding: 0.18rem 0.5rem;
            border-radius: 6px;
        }

        .hist-dir-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 0.18rem 0.5rem;
            border-radius: 6px;
        }

        .hist-dir-badge.call {
            background: rgba(74,222,128,0.1);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.22);
        }

        .hist-dir-badge.put {
            background: rgba(248,113,113,0.1);
            color: #f87171;
            border: 1px solid rgba(248,113,113,0.22);
        }

        .hist-price { font-weight: 700; color: rgba(255,255,255,0.9); }
        .hist-muted { color: rgba(255,255,255,0.35); }

        /* ── Empty / loading states ── */
        .hist-state {
            text-align: center;
            padding: 3.5rem 1rem;
            color: rgba(255,255,255,0.25);
            font-size: 0.85rem;
        }

        .hist-state i { font-size: 1.8rem; display: block; margin-bottom: 0.65rem; }

        /* ── Load more ── */
        .hist-load-more {
            display: flex;
            justify-content: center;
            padding: 1rem;
            border-top: 1px solid rgba(201,176,55,0.08);
        }

        .hist-load-btn {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(201,176,55,0.3);
            background: rgba(201,176,55,0.07);
            color: var(--primary-gold);
            cursor: pointer;
            transition: all 0.18s;
        }

        .hist-load-btn:hover {
            background: rgba(201,176,55,0.14);
            border-color: rgba(201,176,55,0.5);
        }

        .hist-load-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .main-content { padding: 0 1rem 2rem; }
            .hist-hero { padding: 1.25rem; }
            .hist-filters { padding: 0.85rem 1rem; }
            table.hist-table thead th,
            table.hist-table tbody td { padding: 0.6rem 0.75rem; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div id="nav-placeholder" data-nav-type="internal"></div>
    <script src="assets/js/nav-component.js"></script>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Hero -->
        <div class="hist-hero">
            <div class="hist-hero-left">
                <h1><i class="fas fa-clock-rotate-left"></i> Signal History</h1>
                <p>Complete archive of all signals sent to your channel(s)</p>
            </div>
            <span id="hist-plan-badge" class="hist-plan-badge">Loading…</span>
        </div>

        <!-- Filters -->
        <div class="hist-filters" id="hist-filters">
            <!-- Ticker group (hidden for single-channel users) -->
            <div class="hist-filter-group" id="hist-ticker-group">
                <span class="hist-filter-label">Ticker</span>
                <button class="hist-pill active" data-ticker="ALL">All</button>
                <button class="hist-pill" data-ticker="SPY">SPY</button>
                <button class="hist-pill" data-ticker="TSLA">TSLA</button>
                <button class="hist-pill" data-ticker="META">META</button>
                <button class="hist-pill" data-ticker="AAPL">AAPL</button>
                <button class="hist-pill" data-ticker="NVDA">NVDA</button>
                <button class="hist-pill" data-ticker="AMZN">AMZN</button>
            </div>

            <div class="hist-filter-divider" id="hist-ticker-divider"></div>

            <!-- Direction group -->
            <div class="hist-filter-group">
                <span class="hist-filter-label">Direction</span>
                <button class="hist-pill active" data-dir="ALL">All</button>
                <button class="hist-pill call" data-dir="CALL">Calls</button>
                <button class="hist-pill put"  data-dir="PUT">Puts</button>
            </div>

            <div class="hist-filter-divider"></div>

            <!-- Date range -->
            <div class="hist-filter-group">
                <span class="hist-filter-label">From</span>
                <input type="date" class="hist-date-input" id="hist-date-from">
            </div>
            <div class="hist-filter-group">
                <span class="hist-filter-label">To</span>
                <input type="date" class="hist-date-input" id="hist-date-to">
            </div>

            <button class="hist-clear-btn" id="hist-clear-btn">
                <i class="fas fa-xmark"></i> Clear
            </button>
        </div>

        <!-- Table -->
        <div class="hist-table-card">
            <div class="hist-table-meta">
                <div class="hist-table-meta-left">
                    <span class="hist-table-title">All Signals</span>
                    <span class="hist-count-badge" id="hist-row-count">—</span>
                </div>
            </div>

            <div class="hist-table-scroll">
                <table class="hist-table" id="hist-table">
                    <thead>
                        <tr>
                            <th data-col="timestamp">Date &amp; Time <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="stock">Ticker <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="contractType">Direction <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="price">Entry <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="strike">Strike <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="premium">Premium <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="expiration">Expiry <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="vwap">VWAP <i class="fas fa-sort sort-icon"></i></th>
                            <th data-col="mfi">MFI <i class="fas fa-sort sort-icon"></i></th>
                        </tr>
                    </thead>
                    <tbody id="hist-tbody">
                        <tr><td colspan="9" class="hist-state">
                            <i class="fas fa-circle-notch fa-spin"></i> Loading signals…
                        </td></tr>
                    </tbody>
                </table>
            </div>

            <div class="hist-load-more" id="hist-load-more" style="display:none;">
                <button class="hist-load-btn" id="hist-load-btn">
                    <i class="fas fa-chevron-down"></i> Load More
                </button>
            </div>
        </div>

    </div><!-- /main-content -->

    <script type="module">
        import {
            auth, db, onAuthStateChanged, doc, getDoc
        } from './assets/js/firebase-config.js';
        import {
            collection, query, where, orderBy, limit, startAfter, getDocs
        } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

        const STOCK_STYLES = {
            SPY:  { bg: 'rgba(179,161,125,0.18)', color: '#c9b037' },
            TSLA: { bg: 'rgba(232,33,39,0.14)',   color: '#e82127' },
            META: { bg: 'rgba(91,158,255,0.14)',   color: '#5b9eff' },
            AAPL: { bg: 'rgba(200,200,200,0.14)',  color: '#c0c0c0' },
            NVDA: { bg: 'rgba(118,185,0,0.14)',    color: '#76b900' },
            AMZN: { bg: 'rgba(255,153,0,0.14)',    color: '#ff9900' },
        };

        const PAGE_SIZE   = 50;
        let _lastDoc      = null;
        let _hasMore      = false;
        let _userPlan     = 'bundle';
        let _allowedTicker = null;

        /* Active filter state */
        let _filterTicker    = 'ALL';
        let _filterDirection = 'ALL';
        let _filterFrom      = null;
        let _filterTo        = null;

        /* Sort state */
        let _sortCol = 'timestamp';
        let _sortDir = 'desc';

        /* ── Build a Firestore query from current filter + sort ── */
        function buildQuery(afterDoc) {
            const col = collection(db, 'signals');
            const constraints = [];

            /* Hard lock for single-channel users */
            if (_allowedTicker) {
                constraints.push(where('stock', '==', _allowedTicker));
            } else if (_filterTicker !== 'ALL') {
                constraints.push(where('stock', '==', _filterTicker));
            }

            if (_filterDirection !== 'ALL') {
                constraints.push(where('contractType', '==',
                    _filterDirection.charAt(0).toUpperCase() + _filterDirection.slice(1).toLowerCase()));
            }

            constraints.push(orderBy(_sortCol, _sortDir));
            constraints.push(limit(PAGE_SIZE));
            if (afterDoc) constraints.push(startAfter(afterDoc));

            return query(col, ...constraints);
        }

        /* ── Fetch a page of signals ── */
        async function fetchPage(reset) {
            if (reset) {
                _lastDoc = null;
                document.getElementById('hist-tbody').innerHTML =
                    '<tr><td colspan="9" class="hist-state"><i class="fas fa-circle-notch fa-spin"></i> Loading…</td></tr>';
            }

            const btn = document.getElementById('hist-load-btn');
            if (btn) btn.disabled = true;

            try {
                const snap = await getDocs(buildQuery(reset ? null : _lastDoc));
                const rows = snap.docs;

                _hasMore = rows.length === PAGE_SIZE;
                _lastDoc = rows.length ? rows[rows.length - 1] : _lastDoc;

                const signals = rows.map(d => ({ id: d.id, ...d.data() }));

                /* Client-side date filtering (Firestore range queries require composite indexes) */
                const filtered = signals.filter(s => {
                    if (!s.timestamp) return true;
                    const ts = s.timestamp.toDate ? s.timestamp.toDate() : new Date(s.timestamp);
                    if (_filterFrom && ts < _filterFrom) return false;
                    if (_filterTo   && ts > _filterTo)   return false;
                    return true;
                });

                if (reset) {
                    renderRows(filtered, true);
                } else {
                    renderRows(filtered, false);
                }

                document.getElementById('hist-load-more').style.display = _hasMore ? 'flex' : 'none';
                if (btn) btn.disabled = false;

            } catch (err) {
                console.error('[BCS History]', err);
                document.getElementById('hist-tbody').innerHTML =
                    '<tr><td colspan="9" class="hist-state"><i class="fas fa-circle-exclamation"></i> Error loading signals. Please refresh.</td></tr>';
            }
        }

        /* ── Render rows ── */
        function renderRows(signals, replace) {
            const tbody = document.getElementById('hist-tbody');
            const countEl = document.getElementById('hist-row-count');

            if (replace && signals.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="hist-state"><i class="fas fa-satellite-dish"></i> No signals found for this filter.</td></tr>';
                if (countEl) countEl.textContent = '0';
                return;
            }

            const fragment = signals.map(s => {
                const style    = STOCK_STYLES[s.stock] || STOCK_STYLES.SPY;
                const isCall   = (s.contractType || '').toLowerCase() === 'call';
                const dirClass = isCall ? 'call' : 'put';
                const dirIcon  = isCall ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
                const dirLabel = isCall ? 'CALL' : 'PUT';

                let dateStr = '—';
                if (s.timestamp) {
                    try {
                        const d = s.timestamp.toDate ? s.timestamp.toDate() : new Date(s.timestamp);
                        dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
                                  ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                    } catch (_) {}
                }

                let expStr = '—';
                if (s.expiration) {
                    try {
                        const d = new Date(s.expiration + 'T12:00:00');
                        expStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
                    } catch (_) { expStr = s.expiration; }
                }

                return `<tr>
                    <td class="hist-muted">${dateStr}</td>
                    <td><span class="hist-ticker-badge" style="background:${style.bg};color:${style.color};">${s.stock || '—'}</span></td>
                    <td><span class="hist-dir-badge ${dirClass}"><i class="fas ${dirIcon}"></i> ${dirLabel}</span></td>
                    <td class="hist-price">${s.price != null ? '$' + parseFloat(s.price).toFixed(2) : '—'}</td>
                    <td>${s.strike != null ? '$' + parseFloat(s.strike).toFixed(2) : '—'}</td>
                    <td>${s.premium != null ? '$' + parseFloat(s.premium).toFixed(2) : '—'}</td>
                    <td class="hist-muted">${expStr}</td>
                    <td>${s.vwap != null ? '$' + parseFloat(s.vwap).toFixed(2) : '—'}</td>
                    <td>${s.mfi != null ? parseFloat(s.mfi).toFixed(1) : '—'}</td>
                </tr>`;
            }).join('');

            if (replace) {
                tbody.innerHTML = fragment;
            } else {
                tbody.insertAdjacentHTML('beforeend', fragment);
            }

            /* Update count badge */
            if (countEl) {
                const current = parseInt(countEl.textContent) || 0;
                countEl.textContent = replace ? signals.length : current + signals.length;
            }
        }

        /* ── Filter pill event wiring ── */
        function wireFilters() {
            /* Ticker pills */
            document.getElementById('hist-ticker-group').addEventListener('click', e => {
                const pill = e.target.closest('[data-ticker]');
                if (!pill) return;
                document.querySelectorAll('[data-ticker]').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                _filterTicker = pill.dataset.ticker;
                fetchPage(true);
            });

            /* Direction pills */
            document.querySelector('.hist-filters').addEventListener('click', e => {
                const pill = e.target.closest('[data-dir]');
                if (!pill) return;
                document.querySelectorAll('[data-dir]').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                _filterDirection = pill.dataset.dir;
                fetchPage(true);
            });

            /* Date range */
            document.getElementById('hist-date-from').addEventListener('change', e => {
                _filterFrom = e.target.value ? new Date(e.target.value + 'T00:00:00') : null;
                fetchPage(true);
            });
            document.getElementById('hist-date-to').addEventListener('change', e => {
                _filterTo = e.target.value ? new Date(e.target.value + 'T23:59:59') : null;
                fetchPage(true);
            });

            /* Clear button */
            document.getElementById('hist-clear-btn').addEventListener('click', () => {
                _filterTicker    = _allowedTicker || 'ALL';
                _filterDirection = 'ALL';
                _filterFrom      = null;
                _filterTo        = null;
                document.getElementById('hist-date-from').value = '';
                document.getElementById('hist-date-to').value   = '';
                document.querySelectorAll('[data-ticker]').forEach(p => p.classList.toggle('active', p.dataset.ticker === _filterTicker));
                document.querySelectorAll('[data-dir]').forEach(p => p.classList.toggle('active', p.dataset.dir === 'ALL'));
                fetchPage(true);
            });

            /* Load more */
            document.getElementById('hist-load-btn').addEventListener('click', () => fetchPage(false));

            /* Column sort */
            document.querySelectorAll('.hist-table thead th[data-col]').forEach(th => {
                th.addEventListener('click', () => {
                    const col = th.dataset.col;
                    if (_sortCol === col) {
                        _sortDir = _sortDir === 'desc' ? 'asc' : 'desc';
                    } else {
                        _sortCol = col;
                        _sortDir = 'desc';
                    }
                    document.querySelectorAll('.hist-table thead th').forEach(h => h.classList.remove('sorted'));
                    th.classList.add('sorted');
                    th.querySelector('.sort-icon').className =
                        'fas ' + (_sortDir === 'desc' ? 'fa-sort-down' : 'fa-sort-up') + ' sort-icon';
                    fetchPage(true);
                });
            });
        }

        /* ── Auth gate ── */
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }

            let userData;
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (!snap.exists() || !snap.data().setupCompleted) {
                    window.location.href = 'welcome-setup.html'; return;
                }
                userData = snap.data();
            } catch (e) {
                console.error('[BCS History] Firestore error', e);
                return;
            }

            if ((userData.subscriptionStatus || '').toLowerCase() === 'inactive') {
                window.location.href = 'upgrade.html'; return;
            }

            const plan    = (userData.plan || '').toLowerCase();
            const isAdmin = (userData.role || '').toLowerCase() === 'admin';
            _userPlan     = plan;

            const badgeEl = document.getElementById('hist-plan-badge');

            if (plan === 'single' && !isAdmin) {
                _allowedTicker = (userData.allowedTicker || '').toUpperCase();

                /* Hide ticker filter (already locked to one channel) */
                const tickerGroup   = document.getElementById('hist-ticker-group');
                const tickerDivider = document.getElementById('hist-ticker-divider');
                if (tickerGroup)   tickerGroup.style.display   = 'none';
                if (tickerDivider) tickerDivider.style.display = 'none';

                if (badgeEl) {
                    badgeEl.textContent = 'Single Channel · ' + _allowedTicker;
                    badgeEl.classList.add('single');
                }
            } else {
                _allowedTicker = null;
                if (badgeEl) badgeEl.textContent = isAdmin ? 'Admin' : 'Full Bundle';
            }

            wireFilters();
            fetchPage(true);
        });
    </script>
</body>
</html>
